<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply Now — Spring Valley Fire Department</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
</head>
<body>

  <nav>
    <div class="nav-logo"><span>🔥 Spring Valley FD</span></div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="endorsements.html">Endorsements</a></li>
      <li><a href="apply.html" class="active">Apply Now</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <div class="page-hero" style="padding-top: 70px;">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <h1>Apply <span>Now</span></h1>
  </div>

  <section class="form-section">
    <div class="section-header">
      <span class="section-label">Join the Team</span>
      <h2>Start Your <span>Application</span></h2>
      <div class="section-divider"></div>
      <p style="color: rgba(255,255,255,0.55); margin-top: 1rem;">
        Fill out the form below and we'll be in touch within 48 hours.
      </p>
    </div>

    <form class="form-container" data-form-type="application">

      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name *</label>
          <input type="text" id="firstName" name="firstName" placeholder="First name" required />
        </div>
        <div class="form-group">
          <label for="lastName">Last Name *</label>
          <input type="text" id="lastName" name="lastName" placeholder="Last name" required />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label for="phone">Phone Number *</label>
          <input type="tel" id="phone" name="phone" placeholder="(555) 000-0000" required />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="age">Age *</label>
          <input type="number" id="age" name="age" placeholder="e.g. 28" min="18" max="65" required />
        </div>
        <div class="form-group">
          <label for="address">Home Address *</label>
          <input type="text" id="address" name="address" placeholder="Street, City, ZIP" required />
        </div>
      </div>

      <div class="form-group">
        <label for="availability">Availability *</label>
        <select id="availability" name="availability" required>
          <option value="" disabled selected>Select your general availability</option>
          <option value="Weekdays (daytime)">Weekdays (daytime)</option>
          <option value="Evenings">Evenings</option>
          <option value="Weekends (non-Shabbos)">Weekends (non-Shabbos)</option>
          <option value="Flexible / Multiple times">Flexible / Multiple time slots</option>
        </select>
      </div>

      <div class="form-group">
        <label for="experience">Prior Emergency / Volunteer Experience</label>
        <textarea id="experience" name="experience"
          placeholder="Describe any prior experience — fire, EMS, Hatzolah, military, first aid, etc. Leave blank if none."></textarea>
      </div>

      <div class="form-group">
        <label for="religious">Religious Accommodations Needed</label>
        <textarea id="religious" name="religious"
          placeholder="Let us know any accommodations you may need — Shabbos/Yom Tov scheduling, kosher meals, etc."></textarea>
      </div>

      <div class="form-group">
        <label for="message">Why Do You Want to Join? (Optional)</label>
        <textarea id="message" name="message"
          placeholder="Tell us a bit about yourself and why you'd like to serve with the Spring Valley Fire Department..."></textarea>
      </div>

      <div class="form-submit">
        <button type="submit" class="btn btn-primary">Submit Application 🔥</button>
      </div>

    </form>
  </section>

  <footer>
    <p>© 2025 <span>Spring Valley Fire Department</span>. All rights reserved. | Serving our community with pride.</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
